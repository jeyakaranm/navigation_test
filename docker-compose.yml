version: "3.3"

services:
  autonomy_dev:
    container_name: autonomy_dev
    image: jeyakaranm/autonomy_dev:humble
    working_dir: /root/src/autonomy_dev
    network_mode: "host"
    privileged: true
    ipc: host
    stdin_open: true
    tty: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    environment:
      DISPLAY: $DISPLAY
      RCUTILS_COLORIZED_OUTPUT: 1
      QT_X11_NO_MITSHM: 1
      QT_GRAPHICSSYSTEM: native
      QT_DEBUG_PLUGINS: 1
      ROS_LOCALHOST_ONLY: 1
      USE_SIM_TIME: True
      TURTLEBOT3_MODEL: burger
      GAZEBO_MODEL_PATH: /opt/ros/humble/share/turtlebot3_gazebo/models
      ROS_DOMAIN_ID: 0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - $HOME/.Xauthority:/root/.Xauthority
      - $HOME/.ssh:/root/.ssh
      - $HOME/.gitconfig:/root/.gitconfig
      - /dev/shm:/dev/shm
      - $PWD/:/root/src/autonomy_dev